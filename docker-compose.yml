services:
  backend1-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend1-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Override this for your target DB (local Postgres, Supabase, etc.)
      ConnectionStrings__DefaultConnection: Host=host.docker.internal;Port=5432;Database=postgres;Username=postgres;Password=postgres
      Jwt__Key: THIS_IS_MY_SUPER_SECRET_KEY_123456789
      Jwt__Issuer: JwtAuthDemoApi
      Jwt__Audience: JwtAuthDemoUsers
    restart: unless-stopped
